<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inward Rake Handling | HAPA</title>
    <style>
        :root {
            --bg-main: #020205;
            --card-bg: rgba(13, 17, 23, 0.7);
            --primary: #00f0ff;
            --text-light: #ffffff;
            --border: rgba(0, 240, 255, 0.25);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #020205 0%, #0d1117 100%); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-light);
        }

        h1 { 
            color: var(--primary); 
            font-size: 20px; 
            text-align: center; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            background: var(--card-bg);
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

        <a href="#" class="btn">Demurrage Bill</a>

    </div>

</body>
</html>
